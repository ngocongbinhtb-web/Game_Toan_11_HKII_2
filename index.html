<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ĐỀ ÔN TẬP - TOÁN 11</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(66, 165, 245, 0.35), transparent 35%),
                radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.22), transparent 35%),
                linear-gradient(135deg, #eef6ff, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #1f2937;
        }

        .container {
            width: 100%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(37, 99, 235, 0.18);
            padding: 36px;
            animation: fadeIn 0.9s ease;
            border: 1px solid rgba(255,255,255,0.75);
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, #1e88e5, #7c3aed);
            color: white;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(30, 136, 229, 0.25);
        }

        h1 {
            margin: 0;
            font-size: clamp(26px, 4vw, 42px);
            line-height: 1.25;
            color: #0f172a;
            font-weight: 800;
        }

        .info {
            margin-top: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .info-box {
            background: #f8fbff;
            border: 1px solid #e0ecff;
            border-radius: 18px;
            padding: 16px;
            text-align: left;
        }

        .info-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 18px;
            color: #1565c0;
            font-weight: 800;
        }

        .subtitle {
            margin-top: 22px;
            font-size: 18px;
            color: #475569;
            font-weight: 600;
        }

        .slogan {
            margin: 14px 0 26px;
            font-style: italic;
            color: #e53935;
            font-weight: 700;
            font-size: 17px;
        }

        .exam-list { display: grid; gap: 14px; }

        .exam-card {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            background: white;
            border: 1px solid #e5eefc;
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            transition: all 0.25s ease;
            color: inherit;
        }

        .exam-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 18px 36px rgba(30, 136, 229, 0.22);
            border-color: #90caf9;
        }

        .exam-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .exam-content { flex: 1; text-align: left; }
        .exam-title { font-size: 20px; font-weight: 800; color: #0f172a; }
        .exam-desc { margin-top: 4px; font-size: 14px; color: #64748b; font-weight: 600; }
        .exam-arrow { font-size: 36px; color: #1e88e5; transition: 0.25s; }
        .exam-card:hover .exam-arrow { transform: translateX(6px); }

        footer {
            margin-top: 28px;
            text-align: center;
            font-size: 15px;
            color: #64748b;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .container { padding: 26px 20px; border-radius: 22px; }
            .info { grid-template-columns: 1fr; }
            .exam-card { padding: 15px; }
            .exam-title { font-size: 18px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="badge">📘 HỆ THỐNG LUYỆN ĐỀ ONLINE</div>

        <h1>Chọn đề để bắt đầu luyện tập</h1>

        <div class="info">
            <div class="info-box">
                <div class="info-label">Kỳ thi</div>
                <div class="info-value">ĐỀ ÔN TẬP</div>
            </div>

            <div class="info-box">
                <div class="info-label">Tên môn</div>
                <div class="info-value">TOÁN 11</div>
            </div>
        </div>

        <div class="subtitle">Luyện tập mỗi ngày – Tăng tốc về đích!</div>
        <div class="slogan">"Không áp lực, không kim cương 💎"</div>

        <div class="exam-list">
            
        <a class="exam-card" href="index_001.html">
            <div class="exam-icon">🚀</div>
            <div class="exam-content">
                <div class="exam-title">Đề 1</div>
                <div class="exam-desc">Bấm để bắt đầu luyện tập</div>
            </div>
            <div class="exam-arrow">›</div>
        </a>

        <a class="exam-card" href="index_002.html">
            <div class="exam-icon">🚀</div>
            <div class="exam-content">
                <div class="exam-title">Đề 2</div>
                <div class="exam-desc">Bấm để bắt đầu luyện tập</div>
            </div>
            <div class="exam-arrow">›</div>
        </a>

        </div>

        <footer>Chúc các em bình tĩnh, tự tin và đạt kết quả cao!</footer>
    </div>
</body>
</html>
